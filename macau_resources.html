<!DOCTYPE html>
<html lang="zh-Hant-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>澳門資源與挑戰分佈圖</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --primary-color: #2c3e50;
            --resource-color: #27ae60;
            --challenge-color: #e74c3c;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: "Microsoft JhengHei", "微軟正黑體", sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #header {
            background-color: var(--primary-color);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 1000;
        }

        #controls {
            background: #f8f9fa;
            padding: 10px 20px;
            display: flex;
            gap: 15px;
            align-items: center;
            border-bottom: 1px solid #ddd;
        }

        #map {
            flex: 1;
            width: 100%;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        .btn-resource { background-color: var(--resource-color); color: white; }
        .btn-challenge { background-color: var(--challenge-color); color: white; }
        .btn-clear { background-color: #95a5a6; color: white; }
        
        .active-mode {
            outline: 3px solid #f1c40f;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }

        .status-badge {
            font-size: 0.9em;
            padding: 4px 10px;
            background: #eee;
            border-radius: 20px;
        }

        /* 自定義標記樣式 */
        .dot-resource {
            background-color: var(--resource-color);
            border: 2px solid white;
            border-radius: 50%;
        }
        .dot-challenge {
            background-color: var(--challenge-color);
            border: 2px solid white;
            border-radius: 50%;
            box-shadow: 0 0 5px rgba(231, 76, 60, 0.8);
        }
    </style>
</head>
<body>

<div id="header">
    <h2 style="margin:0;">澳門資源與挑戰標記工具</h2>
    <div id="mode-display" class="status-badge">當前模式：查看地圖</div>
</div>

<div id="controls">
    <strong>操作模式：</strong>
    <button class="btn btn-resource" id="resBtn" onclick="setMode('resource')">📌 投放資源卡</button>
    <button class="btn btn-challenge" id="chaBtn" onclick="setMode('challenge')">🔴 標記挑戰（紅色貼紙）</button>
    <button class="btn btn-clear" onclick="clearMap()">🗑️ 清除所有標記</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // 初始化地圖，中心點設為澳門
    const map = L.map('map').setView([22.1987, 113.5439], 14);

    // 使用 OpenStreetMap 圖層
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    let currentMode = 'view'; // view, resource, challenge
    let markers = [];

    // 設定模式
    function setMode(mode) {
        currentMode = mode;
        const display = document.getElementById('mode-display');
        
        // 重置按鈕樣式
        document.getElementById('resBtn').classList.remove('active-mode');
        document.getElementById('chaBtn').classList.remove('active-mode');

        if (mode === 'resource') {
            display.innerText = "當前模式：正在投放「資源卡」";
            document.getElementById('resBtn').classList.add('active-mode');
        } else if (mode === 'challenge') {
            display.innerText = "當前模式：正在標記「挑戰」";
            document.getElementById('chaBtn').classList.add('active-mode');
        }
    }

    // 地圖點擊事件
    map.on('click', function(e) {
        if (currentMode === 'view') return;

        let popupContent = "";
        let className = "";

        if (currentMode === 'resource') {
            const resName = prompt("請輸入資源名稱：", "新資源");
            if (!resName) return;
            popupContent = `<b>資源卡</b><br>${resName}`;
            className = "dot-resource";
        } else if (currentMode === 'challenge') {
            const chaName = prompt("請輸入挑戰內容：", "特定困難");
            if (!chaName) return;
            popupContent = `<b>紅色貼紙 (挑戰)</b><br>${chaName}`;
            className = "dot-challenge";
        }

        addMarker(e.latlng, popupContent, className);
    });

    function addMarker(latlng, content, className) {
        const icon = L.divIcon({
            className: className,
            iconSize: [20, 20]
        });

        const marker = L.marker(latlng, { icon: icon }).addTo(map)
            .bindPopup(content)
            .openPopup();
        
        markers.push(marker);
    }

    function clearMap() {
        if (confirm("確定要清除地圖上所有的標記嗎？")) {
            markers.forEach(m => map.removeLayer(m));
            markers = [];
        }
    }
</script>

</body>
</html>
